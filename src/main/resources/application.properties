#########################################################
# Application
#########################################################

spring.application.name=BankNiftyOptionAnalyzer
server.port=8080

#########################################################
# PostgreSQL
#########################################################

spring.datasource.url=jdbc:postgresql://localhost:5432/banknifty
spring.datasource.username=postgres
spring.datasource.password=tiger
spring.datasource.driver-class-name=org.postgresql.Driver

#########################################################
# JPA
#########################################################

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

#########################################################
# Hikari Connection Pool
#########################################################

spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

#########################################################
# Zerodha Kite Connect
#########################################################

kite.api-key=nurc48t47j0mla3w
kite.api-secret=5b9a3za06h75twxgtx4mt1aof78l2k55
kite.user-id=YC1344

# Generated daily after login
#kite.access-token=tRaJB3ncpEL6030nwGXtyamp2qXgCQeE

kite.redirect-url=http://localhost:8080/api/v1/kite/callback

#########################################################
# Trading Configuration
#########################################################

trading.exchange=NFO
trading.underlying=BANKNIFTY
trading.interval=5minute
trading.candle-limit=500

#########################################################
# Option Chain
#########################################################

optionchain.expiry.current=true
optionchain.strike.range=20

#########################################################
# Logging
#########################################################

logging.level.root=INFO
logging.level.com.banknifty=DEBUG
logging.level.com.zerodhatech=INFO

#########################################################
# Spring Boot Errors
#########################################################

server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=always

#########################################################
# Swagger
#########################################################

springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html

#########################################################
# Actuator
#########################################################

management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

#########################################################
# Cache
#########################################################

spring.cache.type=caffeine

#########################################################
# Jackson
#########################################################

spring.jackson.serialization.WRITE_DATES_AS_TIMESTAMPS=false
spring.jackson.default-property-inclusion=NON_NULL

#########################################################
# Scheduler
#########################################################

spring.task.scheduling.pool.size=4

#########################################################
# Async
#########################################################

spring.task.execution.pool.core-size=4
spring.task.execution.pool.max-size=10

#########################################################
# Banner
#########################################################

spring.main.banner-mode=console

##################################################
# Gateway Configuration
##################################################

gateway.enabled=true
gateway.retry-enabled=true
gateway.retry-count=3
gateway.retry-delay=1000
gateway.timeout=30000
gateway.logging-enabled=true

###################################################
# Trade Candidate Configuration
###################################################

recommendation.candidate.minimum-volume=50000

recommendation.candidate.minimum-open-interest=200000

recommendation.candidate.minimum-premium=100

recommendation.candidate.maximum-premium=500

recommendation.candidate.maximum-spread=0.50