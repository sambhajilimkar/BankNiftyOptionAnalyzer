server:
  port: 8080

spring:
  application:
    name: BankNifty-Option-Analyzer

  datasource:
    url: jdbc:postgresql://localhost:5432/banknifty
    username: postgres
    password: tiger

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  cache:
    type: caffeine

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  level:
    root: INFO
    com.banknifty: DEBUG
    com.zerodhatech: INFO

kite:
  api-key: YOUR_API_KEY
  api-secret: YOUR_API_SECRET
  access-token: YOUR_ACCESS_TOKEN

  timeout: 30
  retry-count: 3

market:
  symbol: NIFTY BANK
  exchange: NSE
  candle-interval: 5minute
  lookback-candles: 300

strategy:
  ema:
    short: 20
    medium: 50
    long: 200

  rsi:
    period: 14

  macd:
    fast: 12
    slow: 26
    signal: 9

  adx:
    period: 14

  atr:
    period: 14

  confidence:
    buy-threshold: 80
    sell-threshold: 80
    no-trade-below: 60

springdoc:
  swagger-ui:
    path: /swagger-ui.html
trading:
   minimum-premium: 50
   maximum-premium: 400
   minimum-volume: 1000
   minimum-open-interest: 5000
   maximum-spread: 2.5
   strike-step: 100
   max-strike-distance: 200